<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Barang - YUDIZ FOTO COPY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="min-h-screen">

<nav class="bg-gray-900 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-[1600px] mx-auto px-6 h-14 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold tracking-tight">YUDIZ <span class="text-yellow-400">INVENTORY</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm text-gray-300">Stocker: <span class="text-white font-semibold" th:text="${username}">User</span></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white p-1.5 rounded transition"><i data-lucide="power" class="w-4 h-4"></i></button>
            </form>
        </div>
    </div>
</nav>

<main class="max-w-[1600px] mx-auto p-6 flex flex-col lg:flex-row gap-6">
    <div class="w-full lg:w-80 shrink-0">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden sticky top-20">
            <div class="bg-gray-50 border-b border-gray-200 px-4 py-3">
                <h2 class="text-sm font-bold text-gray-700 uppercase">Input Data Baru</h2>
            </div>
            <form th:action="@{/stocker/product/add}" method="post" class="p-4 space-y-3">
                <div><label class="text-xs text-gray-600 font-semibold mb-1 block">Nama Jasa/Barang</label><input type="text" name="name" required class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-600"></div>
                <div><label class="text-xs text-gray-600 font-semibold mb-1 block">Deskripsi</label><textarea name="description" rows="2" class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-600"></textarea></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-gray-600 font-semibold mb-1 block">Harga (Rp)</label><input type="number" name="price" required class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-600"></div>
                    <div><label class="text-xs text-gray-600 font-semibold mb-1 block">Stok</label><input type="number" name="stock" required class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-600"></div>
                </div>
                <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-2 rounded text-sm mt-2 shadow-sm transition">Simpan</button>
            </form>
        </div>
    </div>

    <div class="flex-1">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-white">
                <h3 class="text-lg font-bold text-gray-800">Master Data Barang</h3>
                <div class="relative w-64">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-gray-400"></i>
                    <input type="text" id="inventorySearch" onkeyup="filterInventory()" placeholder="Cari..." class="w-full pl-9 pr-3 py-2 bg-gray-50 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-green-600 outline-none">
                </div>
            </div>
            <div th:if="${success}" class="m-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded text-sm flex items-center"><i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> <span th:text="${success}"></span></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-600 border-b border-gray-200 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-3 font-semibold">Nama Barang/Jasa</th>
                            <th class="px-6 py-3 font-semibold text-right">Harga Unit</th>
                            <th class="px-6 py-3 font-semibold text-center">Stok</th>
                            <th class="px-6 py-3 font-semibold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody" class="divide-y divide-gray-100">
                        <tr th:if="${#lists.isEmpty(products)}"><td colspan="4" class="px-6 py-8 text-center text-gray-400 italic">Data kosong.</td></tr>
                        <tr th:each="product : ${products}" class="inventory-row hover:bg-gray-50">
                            <td class="px-6 py-3 font-semibold text-gray-800 product-name" th:text="${product.name}"></td>
                            <td class="px-6 py-3 text-right font-medium text-green-700" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}"></td>
                            <td class="px-6 py-3 text-center"><span th:classappend="${product.stock <= 5} ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700'" class="px-2 py-1 rounded text-xs font-bold border border-gray-200" th:text="${product.stock}"></span></td>
                            <td class="px-6 py-3 text-center">
                                <a th:href="@{'/stocker/product/delete/' + ${product.id}}" onclick="return confirm('Hapus barang ini?')" class="text-red-600 hover:bg-red-50 px-3 py-1.5 rounded border border-transparent hover:border-red-200 text-xs font-semibold transition">Hapus</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script>
    lucide.createIcons();
    function filterInventory() {
        const term = document.getElementById("inventorySearch").value.toLowerCase();
        document.querySelectorAll(".inventory-row").forEach(row => {
            const name = row.querySelector(".product-name").innerText.toLowerCase();
            row.style.display = name.includes(term) ? "" : "none";
        });
    }
</script>
</body>
</html>
