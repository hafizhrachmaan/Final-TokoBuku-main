<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Dashboard - YUDIZ FOTO COPY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="min-h-screen">

<nav class="bg-green-800 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-6">
            <h1 class="text-xl font-bold tracking-tight border-r border-green-600 pr-6">YUDIZ <span class="text-yellow-400">FOTO COPY</span></h1>
            <div class="hidden md:flex space-x-4 text-sm font-medium">
                <a href="#" class="bg-green-900 text-white px-3 py-1.5 rounded">Terminal POS</a>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-sm font-semibold" th:text="${username}">User</span>
            <div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center"><i data-lucide="user" class="w-4 h-4"></i></div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-gray-800">Katalog Cepat</h2>
            <input type="text" placeholder="Cari..." class="w-64 border border-gray-300 rounded-md p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none">
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            <div th:each="product : ${products}" class="bg-white border border-gray-200 rounded-lg p-4 flex flex-col text-center hover:border-green-600 transition">
                <div class="w-12 h-12 bg-gray-100 rounded-full mx-auto flex items-center justify-center mb-3"><i data-lucide="copy" class="w-6 h-6 text-gray-400"></i></div>
                <h3 class="font-semibold text-gray-800 text-sm mb-1" th:text="${product.name}">Produk</h3>
                <p class="text-green-700 font-bold text-sm mb-3" th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</p>
                <button class="w-full bg-gray-100 hover:bg-green-700 hover:text-white text-gray-600 text-xs font-bold py-2 rounded transition">ADD</button>
            </div>
        </div>
    </div>

    <div class="lg:col-span-1">
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm flex flex-col min-h-[500px] sticky top-24">
            <div class="p-5 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-sm font-bold text-gray-800">Keranjang Aktif</h2>
                <span class="bg-yellow-500 text-white text-xs font-bold px-2 py-1 rounded">0</span>
            </div>
            <div class="flex-grow flex flex-col items-center justify-center p-8 text-gray-400">
                <i data-lucide="shopping-cart" class="w-12 h-12 mb-2 opacity-50"></i>
                <p class="text-sm italic">Pilih barang di sebelah kiri</p>
            </div>
            <div class="p-5 bg-gray-50 border-t border-gray-200 space-y-4">
                <div class="flex justify-between items-center"><span class="text-gray-600 font-medium text-sm">Total</span><span class="text-xl font-bold text-green-700">Rp 0</span></div>
                <button class="w-full bg-gray-300 text-gray-500 font-bold py-3 rounded cursor-not-allowed text-sm uppercase">Checkout</button>
            </div>
        </div>
    </div>
</main>
<script>lucide.createIcons();</script>
</body>
</html>
