<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRD Dashboard - YUDIZ FOTO COPY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body>

<nav class="bg-green-800 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-6">
            <div class="flex flex-col border-r border-green-600 pr-6">
                <span class="text-xl font-bold leading-none">YUDIZ <span class="text-yellow-400">HRD</span></span>
                <span class="text-[10px] uppercase tracking-wider text-green-200 mt-1">Management</span>
            </div>
            <div class="hidden md:flex space-x-2 text-sm font-medium">
                <a th:href="@{/hrd/dashboard}" class="bg-green-900 text-white px-3 py-1.5 rounded">Dashboard</a>
                <a th:href="@{/hrd/products}" class="text-green-200 hover:text-white px-3 py-1.5 rounded transition">Produk</a>
                <a th:href="@{/hrd/transactions}" class="text-green-200 hover:text-white px-3 py-1.5 rounded transition">Transaksi</a>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-right hidden sm:block">
                <p class="text-[10px] text-green-200 uppercase">Admin Access</p>
                <p class="text-sm font-bold leading-none" th:text="${username}">User</p>
            </div>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white p-2 rounded transition-colors"><i data-lucide="power" class="w-4 h-4"></i></button>
            </form>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto mt-6 px-4 pb-12">
    <div th:if="${param.success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-sm font-medium">Operasi berhasil!</div>
    <div th:if="${param.accepted}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-sm font-medium">Pengguna berhasil diterima!</div>
    <div th:if="${param.rejected}" class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded mb-4 text-sm font-medium">Pengguna ditolak.</div>
    <div th:if="${param.cut}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm font-medium">Karyawan dinonaktifkan.</div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden mb-6">
        <div class="bg-gray-50 border-b border-gray-200 px-5 py-3 flex justify-between items-center">
            <h2 class="text-gray-800 font-bold text-sm flex items-center uppercase"><i data-lucide="users" class="w-4 h-4 mr-2 text-green-700"></i> Permohonan Baru</h2>
            <span class="bg-yellow-500 text-white text-xs font-bold px-2 py-1 rounded" th:text="${#lists.size(pendingEmployees)} + ' Menunggu'"></span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200 text-xs text-gray-600 uppercase">
                    <tr>
                        <th class="px-5 py-3 font-semibold">Pelamar</th>
                        <th class="px-5 py-3 font-semibold">Posisi</th>
                        <th class="px-5 py-3 font-semibold text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 text-sm">
                    <tr th:if="${#lists.isEmpty(pendingEmployees)}"><td colspan="3" class="px-5 py-6 text-center text-gray-400 italic">Tidak ada permohonan baru.</td></tr>
                    <tr th:each="employee : ${pendingEmployees}">
                        <td class="px-5 py-3">
                            <p class="font-bold text-gray-800" th:text="${employee.fullName}"></p>
                            <p class="text-xs text-gray-500" th:text="${employee.username} + ' • ' + ${employee.email}"></p>
                        </td>
                        <td class="px-5 py-3"><span class="bg-green-100 text-green-800 text-xs font-semibold px-2 py-1 rounded" th:text="${employee.role}"></span></td>
                        <td class="px-5 py-3 text-center flex justify-center space-x-2">
                            <form th:action="@{/hrd/accept/{id}(id=${employee.id})}" method="post">
                                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-3 py-1.5 rounded">TERIMA</button>
                            </form>
                            <form th:action="@{/hrd/reject/{id}(id=${employee.id})}" method="post">
                                <button type="submit" class="bg-red-100 text-red-600 hover:bg-red-600 hover:text-white text-xs font-bold px-3 py-1.5 rounded border border-red-200">TOLAK</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 bg-white rounded-lg shadow-sm border border-gray-200">
            <div class="bg-gray-50 border-b border-gray-200 px-5 py-3"><h3 class="font-bold text-gray-800 text-sm uppercase">Tambah Karyawan</h3></div>
            <form th:action="@{/hrd/addEmployee}" method="post" class="p-5 space-y-4">
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Username</label>
                    <input type="text" name="username" class="w-full border border-gray-300 rounded p-2 text-sm focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none" required>
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Password</label>
                    <input type="password" name="password" class="w-full border border-gray-300 rounded p-2 text-sm focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none" required>
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Role / Jabatan</label>
                    <select name="role" class="w-full border border-gray-300 rounded p-2 text-sm focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none">
                        <option th:each="r : ${allRoles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-2.5 rounded text-sm mt-2 transition">Simpan</button>
            </form>
        </div>

        <div class="lg:col-span-2 bg-white rounded-lg shadow-sm border border-gray-200">
            <div class="bg-gray-50 border-b border-gray-200 px-5 py-3"><h3 class="font-bold text-gray-800 text-sm uppercase">Karyawan Aktif</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-600 text-xs uppercase border-b border-gray-200">
                        <tr>
                            <th class="px-5 py-3 font-semibold">User</th>
                            <th class="px-5 py-3 font-semibold text-center">Role</th>
                            <th class="px-5 py-3 font-semibold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr th:each="employee : ${verifiedEmployees}">
                            <td class="px-5 py-3">
                                <p class="font-bold text-gray-800" th:text="${employee.username}"></p>
                                <p class="text-xs text-gray-500" th:text="'ID: #' + ${employee.id}"></p>
                            </td>
                            <td class="px-5 py-3 text-center"><span class="bg-gray-100 text-gray-700 text-xs font-semibold px-2 py-1 rounded" th:text="${employee.role}"></span></td>
                            <td class="px-5 py-3 text-center">
                                 <form th:action="@{/hrd/cut/{id}(id=${employee.id})}" method="post">
                                    <button type="submit" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded transition">PECAT</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
