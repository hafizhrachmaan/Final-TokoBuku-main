<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - YUDIZ FOTO COPY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="min-h-screen">

<nav class="bg-green-800 text-white shadow-md z-50">
    <div class="px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <div class="flex flex-col border-r border-green-600 pr-6">
                <h1 class="text-xl font-bold tracking-tight">YUDIZ <span class="text-yellow-400">FOTO COPY</span></h1>
                <p class="text-[9px] tracking-widest text-green-200 font-semibold uppercase">Point of Sale</p>
            </div>
            <div class="hidden md:flex space-x-2 text-sm font-medium">
                <a th:href="@{/kasir/dashboard}" class="text-green-200 hover:text-white px-3 py-1.5 rounded transition">Terminal POS</a>
                <a th:href="@{/kasir/history}" class="bg-green-900 text-white px-3 py-1.5 rounded">Riwayat</a>
            </div>
        </div>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white p-2 rounded transition"><i data-lucide="power" class="w-4 h-4"></i></button>
        </form>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-6 md:p-10">
    
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Riwayat Penjualan</h2>
            <p class="text-sm text-gray-500 mt-1">Daftar transaksi yang telah diselesaikan.</p>
        </div>
        <div class="relative w-72">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-gray-400"></i>
            <input type="text" id="historySearch" placeholder="Cari Kasir / ID..." class="w-full pl-9 pr-3 py-2 bg-white border border-gray-300 rounded-md text-sm focus:ring-1 focus:ring-green-600 outline-none shadow-sm">
        </div>
    </div>

    <div th:if="${param.checkout_success}" class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg flex items-center shadow-sm">
        <i data-lucide="check-circle" class="w-5 h-5 mr-3"></i>
        <span class="font-semibold text-sm" th:text="'Transaksi #' + ${param.checkout_success} + ' Berhasil Dicetak!'"></span>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase">
                <tr>
                    <th class="px-6 py-4">Invoice ID</th>
                    <th class="px-6 py-4">Waktu Transaksi</th>
                    <th class="px-6 py-4">Petugas Kasir</th>
                    <th class="px-6 py-4 text-right">Total Harga</th>
                    <th class="px-6 py-4 text-center">Cetak PDF</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-sm">
                <tr th:if="${#lists.isEmpty(transactions)}"><td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">Belum ada riwayat transaksi.</td></tr>
                <tr th:each="tx : ${transactions}" class="hover:bg-gray-50 history-item">
                    <td class="px-6 py-4 font-mono text-gray-500 font-bold" th:text="'INV-' + ${tx.id}"></td>
                    <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(tx.transactionDate, 'dd MMM yyyy - HH:mm')}"></td>
                    <td class="px-6 py-4 font-semibold text-gray-800" th:text="${tx.user.username}"></td>
                    <td class="px-6 py-4 text-right font-bold text-green-700" th:text="${'Rp ' + #numbers.formatDecimal(tx.totalPrice, 0, 'POINT', 0, 'COMMA')}"></td>
                    <td class="px-6 py-4 text-center">
                        <a th:href="@{/kasir/transaction/pdf/{id}(id=${tx.id})}" target="_blank" class="inline-flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 px-3 py-1.5 rounded text-xs font-semibold transition">
                            <i data-lucide="printer" class="w-3.5 h-3.5 mr-1.5"></i> Cetak Struk
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    lucide.createIcons();
    document.getElementById('historySearch').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.history-item').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
        });
    });
</script>
</body>
</html>
