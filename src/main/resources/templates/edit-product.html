<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Produk - YUDIZ FOTO COPY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Daftar Produk & Stok</h2>
        
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-green-800 text-white text-xs uppercase tracking-wider">
                    <tr>
                        <th class="px-6 py-4 font-semibold">Produk</th>
                        <th class="px-6 py-4 font-semibold text-center">Stok</th>
                        <th class="px-6 py-4 font-semibold text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr th:each="product : ${products}" class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <p class="font-bold text-gray-800" th:text="${product.name}"></p>
                            <p class="text-sm text-green-700 font-semibold" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}"></p>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span th:text="${product.stock}" class="bg-gray-100 px-3 py-1 rounded text-sm font-semibold text-gray-700 border border-gray-300"></span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button th:attr="data-modal-target='editProd-' + ${product.id}, data-modal-toggle='editProd-' + ${product.id}" 
                                    class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded shadow-sm transition-colors">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>

                            <div th:id="'editProd-' + ${product.id}" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-modal md:h-full bg-gray-900/50">
                                <div class="relative p-4 w-full max-w-md h-full md:h-auto">
                                    <div class="relative bg-white rounded-lg shadow-lg p-6">
                                        <div class="flex justify-between items-center mb-4 border-b pb-3">
                                            <h3 class="text-lg font-bold text-gray-800">Update Produk</h3>
                                            <button type="button" th:attr="data-modal-hide='editProd-' + ${product.id}" class="text-gray-400 hover:text-red-500">
                                                <i data-lucide="x" class="w-5 h-5"></i>
                                            </button>
                                        </div>

                                        <form th:action="@{/stoker/product/edit/{id}(id=${product.id})}" method="post" class="space-y-4 text-left">
                                            <div>
                                                <label class="text-xs font-semibold text-gray-600 block mb-1">Nama Barang / Jasa</label>
                                                <input type="text" name="name" th:value="${product.name}" class="w-full bg-gray-50 border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none" required>
                                            </div>
                                            <div class="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label class="text-xs font-semibold text-gray-600 block mb-1">Harga Unit (Rp)</label>
                                                    <input type="number" name="price" th:value="${product.price}" class="w-full bg-gray-50 border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none" required>
                                                </div>
                                                <div>
                                                    <label class="text-xs font-semibold text-gray-600 block mb-1">Jumlah Stok</label>
                                                    <input type="number" name="stock" th:value="${product.stock}" class="w-full bg-gray-50 border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none" required>
                                                </div>
                                            </div>
                                            <div class="pt-2">
                                                <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 rounded-md text-sm transition-colors">
                                                    Simpan Perubahan
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
