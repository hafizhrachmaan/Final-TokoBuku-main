<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Karyawan - YUDIZ FOTO COPY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="p-4 md:p-8 flex justify-center items-center min-h-screen">

  <div class="w-full max-w-2xl bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
    <div class="bg-green-800 px-6 py-6 text-white flex justify-between items-center">
        <div>
            <h2 class="text-xl font-bold uppercase tracking-wide">Registrasi Karyawan</h2>
            <p class="text-green-200 text-xs mt-1">YUDIZ FOTO COPY Management</p>
        </div>
        <i data-lucide="user-plus" class="w-8 h-8 text-yellow-400 opacity-80"></i>
    </div>

    <div class="p-6 md:p-8">
        <div th:if="${param.success}" class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded text-sm flex items-center">
            <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i> Pendaftaran berhasil, tunggu verifikasi HRD.
        </div>
        <div th:if="${param.error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded text-sm flex items-center">
            <i data-lucide="alert-circle" class="w-5 h-5 mr-2"></i> Username sudah digunakan!
        </div>

        <form th:action="@{/register}" method="post" class="space-y-6">
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-gray-700 border-b border-gray-200 pb-2 uppercase">Identitas Pribadi</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Nama Lengkap</label>
                        <input type="text" name="fullName" required class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Email Aktif</label>
                        <input type="email" name="email" required class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Nomor Telepon/WA</label>
                        <input type="tel" name="phone" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Alamat</label>
                        <input type="text" name="address" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                    </div>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <h3 class="text-sm font-bold text-gray-700 border-b border-gray-200 pb-2 uppercase">Informasi Pekerjaan & Akun</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Posisi Dilamar</label>
                        <select name="role" required class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                            <option value="KASIR">KASIR (Frontdesk)</option>
                            <option value="STOCKER">STOCKER (Gudang/Inventory)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Pendidikan Terakhir</label>
                        <input type="text" name="lastEducation" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Username Sistem</label>
                        <input type="text" name="username" required class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">Password</label>
                        <input type="password" name="password" required class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1">Pengalaman Kerja (Opsional)</label>
                    <textarea name="workExperience" rows="2" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-1 focus:ring-green-600 outline-none bg-gray-50 resize-none"></textarea>
                </div>
            </div>

            <div class="pt-4 flex flex-col md:flex-row items-center justify-between gap-4">
                <a th:href="@{/login}" class="text-sm font-semibold text-gray-600 hover:text-green-700 flex items-center order-2 md:order-1">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Kembali Login
                </a>
                <button type="submit" class="w-full md:w-auto bg-green-700 hover:bg-green-800 text-white font-bold rounded p-3 px-8 shadow-sm transition order-1 md:order-2">
                    KIRIM LAMARAN
                </button>
            </div>
        </form>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
